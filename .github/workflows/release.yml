name: release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

jobs:
  detect-version:
    name: detect version bump
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - id: check
        name: compare package.json version with previous commit
        shell: bash
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version package.json)
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS=$(git show HEAD^:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          else
            PREVIOUS=""
          fi
          echo "current=$CURRENT"
          echo "previous=$PREVIOUS"
          if [ -n "$CURRENT" ] && [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # 先建好 release，让各平台 job 并行上传时不竞态创建（macOS 走 gh upload 需 release 已存在）
  create-release:
    name: create release
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: create release if absent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="v${{ needs.detect-version.outputs.version }}"
          gh release view "$V" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$V" --repo "$GITHUB_REPOSITORY" \
              --title "markio $V" \
              --notes "Automated release for markio $V. See assets below for installers per platform."

  build:
    name: build ${{ matrix.platform.label }}
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # Intel 包在 Apple Silicon runner 上交叉编译（macos-13 Intel runner 已基本停供，会卡在排队）
          - label: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: install linux build deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.14.0
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      # 按当前平台 target 预先编译 markio-preview 轻量预览器，
      # 供 externalBin 把它打进安装产物（Windows 进安装目录、macOS 进 .app/Contents/MacOS）。
      - name: build markio-preview sidecar
        run: node scripts/prep-preview-sidecar.mjs ${{ matrix.platform.target }}

      # 非 macOS（Windows / Linux）：tauri-action 直接构建并上传到已建 release。
      # externalBin 已把 markio-preview 打进安装产物；Windows NSIS 钩子注册右键"用 Markio 预览"。
      - name: build & publish (windows / linux)
        if: ${{ !startsWith(matrix.platform.os, 'macos') }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 直发渠道不受 App Store 合规约束，强制 global 让所有平台、所有地区都展示完整 AI 模型源
          # （App Store 包另走 scripts/build-mas.sh 的 auto/cn 策略）
          VITE_MARKIO_AI_REGION: global
          # 更新签名暂时关闭（createUpdaterArtifacts=false），待补回 TAURI_SIGNING 密钥后再开启自动更新
        with:
          tagName: v${{ needs.detect-version.outputs.version }}
          releaseName: markio v${{ needs.detect-version.outputs.version }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform.args }}

      # macOS：直发脚本（构建主 app → 嵌入独立 "Markio Preview.app" 实现右键"打开方式"/双击预览 → 打 DMG）再上传。
      # ⚠️ 本步骤尚未在 CI 实跑验证（嵌套/交叉编译/DMG 在本机已验证，CI 环境首次发版前建议手动触发一次确认）。
      - name: package & upload (macOS)
        if: ${{ startsWith(matrix.platform.os, 'macos') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_MARKIO_AI_REGION: global
        run: |
          bash scripts/package-macos-direct.sh ${{ matrix.platform.target }} | tee /tmp/pkg.log
          DMG="$(grep '^DMG=' /tmp/pkg.log | tail -1)"; DMG="${DMG#DMG=}"
          gh release upload "v${{ needs.detect-version.outputs.version }}" "$DMG" \
            --repo "$GITHUB_REPOSITORY" --clobber
