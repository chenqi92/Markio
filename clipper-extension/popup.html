<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markio Web Clipper</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1f2328;
        --muted: #6b7280;
        --border: #d0d7de;
        --accent: #2563eb;
        --accent-fg: #ffffff;
        --bg: #ffffff;
        --field-bg: #f6f8fa;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e6edf3;
          --muted: #9da7b3;
          --border: #30363d;
          --accent: #3b82f6;
          --bg: #0d1117;
          --field-bg: #161b22;
        }
      }
      * { box-sizing: border-box; }
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      label {
        display: block;
        margin: 10px 0 4px;
        font-size: 12px;
        color: var(--muted);
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        color: var(--fg);
        background: var(--field-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .hint {
        margin: 4px 0 0;
        font-size: 11px;
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 7px 8px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--field-bg);
        color: var(--fg);
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
      }
      #status {
        margin-top: 12px;
        min-height: 16px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #status.ok { color: #2e7d32; }
      #status.err { color: #c62828; }
    </style>
  </head>
  <body>
    <h1>Markio Web Clipper</h1>

    <label for="endpoint">接收端地址</label>
    <input
      id="endpoint"
      type="text"
      placeholder="http://127.0.0.1:8787"
      autocomplete="off"
      spellcheck="false"
    />
    <p class="hint">从 Markio 设置 → 网页收藏 中复制。</p>

    <label for="token">访问 token</label>
    <input id="token" type="password" placeholder="从 Markio 设置复制" autocomplete="off" />

    <div class="row">
      <button id="save" class="primary">保存</button>
      <button id="test">测试连接</button>
    </div>

    <div class="row">
      <button id="clip" class="primary">剪藏当前页</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
